<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>آرشیو کانال‌ها</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="app">

  <!-- صفحه‌ی لیست کانال‌ها -->
  <section id="screen-list" class="screen active">
    <header class="topbar">
      <h1 class="topbar-title">آرشیو کانال‌ها</h1>
      <button id="btn-open-search" class="icon-btn" aria-label="جستجو">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div id="global-search-bar" class="search-bar hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="search-icon"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="global-search-input" type="text" placeholder="جستجو در همه‌ی کانال‌ها…" autocomplete="off">
    </div>

    <div id="channel-list" class="list"></div>
    <div id="search-results" class="list hidden"></div>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-emoji">📭</div>
      <p>هنوز هیچ پستی ذخیره نشده</p>
      <span>یه پست از یه کانال، تو تلگرام فوروارد کن به بات</span>
    </div>
  </section>

  <!-- صفحه‌ی چت یک کانال -->
  <section id="screen-chat" class="screen">
    <header class="topbar chat-topbar">
      <button id="btn-back" class="icon-btn" aria-label="بازگشت">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="chat-title-wrap">
        <div id="chat-avatar" class="avatar"></div>
        <div class="chat-title-text">
          <div id="chat-title" class="chat-title"></div>
          <div id="chat-subtitle" class="chat-subtitle"></div>
        </div>
      </div>
      <button id="btn-chat-search" class="icon-btn" aria-label="جستجو در کانال">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div id="chat-search-bar" class="search-bar hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="search-icon"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="chat-search-input" type="text" placeholder="جستجو در این کانال…" autocomplete="off">
    </div>

    <div id="messages" class="messages"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
